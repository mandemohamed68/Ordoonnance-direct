<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#10b981" />
    <link rel="manifest" href="/manifest.json" />
    <title>PharmaLiv - Livraison de Médicaments</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; background: #f8fafc;">
        <div style="width: 40px; height: 40px; border: 4px solid #e2e8f0; border-top: 4px solid #10b981; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 16px; color: #64748b; font-weight: 600;">Initialisation de l'application...</p>
        <div id="error-log" style="margin-top: 20px; color: red; font-size: 12px; max-width: 80%; word-wrap: break-word;"></div>
      </div>
      <style>
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      </style>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }

      window.addEventListener('error', function(event) {
        var errorLog = document.getElementById('error-log');
        if (errorLog) {
          errorLog.innerHTML += '<br/>Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno;
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorLog = document.getElementById('error-log');
        if (errorLog) {
          errorLog.innerHTML += '<br/>Promise Rejection: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown');
        }
      });
      console.log('HTML Root Ready. Loading main.tsx...');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

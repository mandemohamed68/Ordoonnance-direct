<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Ordonnance Direct | Burkina Faso</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #ffffff; color: #1e293b;">
        <div class="loader-container">
          <div class="logo-pulse"></div>
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; z-index: 10;"><rect width="18" height="18" x="3" y="3" rx="4" ry="4"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="8" x2="16" y1="12" y2="12"/></svg>
        </div>
        <div id="error-log" style="margin-top: 20px; color: #ef4444; font-size: 11px; max-width: 80%; word-wrap: break-word; font-family: monospace; opacity: 0.6;"></div>
      </div>
      <style>
        body { margin: 0; background: #ffffff; }
        .loader-container { position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; background: #ecfdf5; border-radius: 40px; }
        .logo-pulse { position: absolute; width: 100%; height: 100%; border-radius: 40px; box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); animation: pulse-shadow 2s infinite ease-in-out; }
        @keyframes pulse-shadow {
          0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); transform: scale(1); }
          50% { box-shadow: 0 0 0 30px rgba(16, 185, 129, 0.03); transform: scale(1.05); }
          100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); transform: scale(1); }
        }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.2; } 50% { transform: scale(1.2); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.2; } }
      </style>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }

      window.addEventListener('error', function(event) {
        var errorLog = document.getElementById('error-log');
        if (errorLog) {
          errorLog.innerHTML += '<br/>Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno;
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorLog = document.getElementById('error-log');
        if (errorLog) {
          errorLog.innerHTML += '<br/>Promise Rejection: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown');
        }
      });
      console.log('HTML Root Ready. Loading main.tsx...');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

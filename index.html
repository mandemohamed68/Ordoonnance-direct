<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#10b981" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%2310b981%22/><path d=%22M50 25v50M25 50h50%22 stroke=%22white%22 stroke-width=%2215%22 stroke-linecap=%22round%22/></svg>" />
    <link rel="manifest" href="/manifest.json" />
    <title>Ordonnance Direct | Burkina Faso</title>
  </head>
  <body>
    <div id="root">
      <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: white;">
        <div class="loader-container">
          <div class="logo-pulse"></div>
          <div class="spinner"></div>
        </div>
        <p style="margin-top: 24px; color: #94a3b8; font-weight: 500; letter-spacing: 0.05em; font-size: 14px; text-transform: uppercase;">Ordonnance Direct</p>
        <div id="error-log" style="margin-top: 20px; color: #ef4444; font-size: 11px; max-width: 80%; word-wrap: break-word; font-family: monospace; opacity: 0.6;"></div>
      </div>
      <style>
        body { margin: 0; background: #0f172a; }
        .loader-container { position: relative; width: 64px; height: 64px; display: flex; align-items: center; justify-content: center; }
        .logo-pulse { position: absolute; width: 100%; height: 100%; background: #10b981; border-radius: 20px; opacity: 0.2; animation: pulse 2s infinite ease-in-out; }
        .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.2; } 50% { transform: scale(1.2); opacity: 0.1; } 100% { transform: scale(0.8); opacity: 0.2; } }
      </style>
    </div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }

      window.addEventListener('error', function(event) {
        var errorLog = document.getElementById('error-log');
        if (errorLog) {
          errorLog.innerHTML += '<br/>Error: ' + event.message + ' at ' + event.filename + ':' + event.lineno;
        }
      });
      window.addEventListener('unhandledrejection', function(event) {
        var errorLog = document.getElementById('error-log');
        if (errorLog) {
          errorLog.innerHTML += '<br/>Promise Rejection: ' + (event.reason ? (event.reason.message || event.reason) : 'Unknown');
        }
      });
      console.log('HTML Root Ready. Loading main.tsx...');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
